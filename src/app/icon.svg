<svg width="96" height="96" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Static, square favicon version of the AutoTechify tortoise (no animation) -->

  <!-- Solid background so search engines don't render transparent edges as gray -->
  <rect width="40" height="40" fill="#ffffff"/>

  <!-- Shell (main body - vertical oval) -->
  <ellipse cx="20" cy="20" rx="10" ry="14" fill="#1a1a1a" stroke="#ffffff" stroke-width="1.5"/>

  <!-- Shell Pattern (hexagonal segments) -->
  <ellipse cx="20" cy="20" rx="7" ry="10" fill="#2d2d2d"/>

  <!-- Shell segments -->
  <circle cx="20" cy="14" r="2" fill="#ffffff"/>
  <circle cx="17" cy="18" r="2" fill="#ffffff"/>
  <circle cx="23" cy="18" r="2" fill="#ffffff"/>
  <circle cx="20" cy="21" r="2" fill="#ffffff"/>
  <circle cx="17" cy="24" r="1.8" fill="#ffffff"/>
  <circle cx="23" cy="24" r="1.8" fill="#ffffff"/>

  <!-- Head (pointing UP - at top) -->
  <ellipse cx="20" cy="6" rx="3" ry="4" fill="#1a1a1a" stroke="#ffffff" stroke-width="1"/>
  <circle cx="18.5" cy="5.5" r="0.7" fill="#fff"/>
  <circle cx="21.5" cy="5.5" r="0.7" fill="#fff"/>

  <!-- Front Left Leg (top left) -->
  <ellipse cx="12" cy="11" rx="2.5" ry="3" fill="#1a1a1a" stroke="#ffffff" stroke-width="1" transform="rotate(-45 12 11)"/>

  <!-- Front Right Leg (top right) -->
  <ellipse cx="28" cy="11" rx="2.5" ry="3" fill="#1a1a1a" stroke="#ffffff" stroke-width="1" transform="rotate(45 28 11)"/>

  <!-- Back Left Leg (bottom left) -->
  <ellipse cx="12" cy="29" rx="2.5" ry="3" fill="#1a1a1a" stroke="#ffffff" stroke-width="1" transform="rotate(-135 12 29)"/>

  <!-- Back Right Leg (bottom right) -->
  <ellipse cx="28" cy="29" rx="2.5" ry="3" fill="#1a1a1a" stroke="#ffffff" stroke-width="1" transform="rotate(135 28 29)"/>

  <!-- Tail (pointing DOWN - at bottom) -->
  <ellipse cx="20" cy="34" rx="2" ry="3" fill="#1a1a1a" stroke="#ffffff" stroke-width="1"/>
</svg>
